<style>
  :root {
    --primary: #6c47ff; --primary-light: #f0ecff; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    --card-bg: #ffffff; --green: #10b981; --red: #ef4444; --radius: 16px; --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .theme-violet { --primary: #6c47ff; --primary-light: #f0ecff; } .theme-sage { --primary: #76a086; --primary-light: #eef5f1; }
  .theme-rose { --primary: #d4a5b8; --primary-light: #fbf0f4; } .theme-ocean { --primary: #6da9c4; --primary-light: #edf6f9; }
  .theme-terracotta { --primary: #cc8b79; --primary-light: #fbf2ef; } .theme-latte { --primary: #bfa18f; --primary-light: #f7f3f0; }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: #0f172a; display: flex; justify-content: center; min-height: 100vh; color: var(--text-main); }
  
  .app { width: 100%; max-width: 480px; background: var(--bg); height: 100vh; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
  
  .auth-wrapper { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }

  .main-content { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 110px; display: none; opacity: 0; transform: translateY(8px); transition: var(--transition); }
  .main-content.active { display: block; opacity: 1; transform: translateY(0); }
  
  .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .brand { font-size: 1.4rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }

  .bottom-nav { position: absolute; bottom: 0; width: 100%; max-width: 480px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0, 0, 0, 0.04); border-radius: 28px 28px 0 0; z-index: 100; box-shadow: 0 -8px 32px rgba(15, 23, 42, 0.05); padding: 0 10px; }
  .nav-item { border: none; background: none; color: var(--text-muted); font-size: 10px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: var(--transition); flex: 1; height: 100%; justify-content: center; }
  .nav-item.active { color: var(--primary); }
  .nav-item span.material-symbols-outlined { font-size: 24px; transition: var(--transition); padding: 4px 12px; border-radius: 16px; }
  .nav-item.active span.material-symbols-outlined { background: var(--primary-light); color: var(--primary); font-variation-settings: 'FILL' 1; }

  .fab-container { position: relative; top: -20px; z-index: 101; }
  .fab-btn { background: linear-gradient(135deg, var(--primary), #8b6eff); color: white; width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg); box-shadow: 0 8px 24px rgba(108, 71, 255, 0.35); transition: var(--transition); }

  .card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: 0 4px 18px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.01); }
  .hero { background: linear-gradient(135deg, var(--primary), #5b36ea); color: white; box-shadow: 0 12px 24px rgba(108, 71, 255, 0.25); }
  .hero p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .hero h2 { font-size: 2.2rem; font-weight: 700; margin-bottom: 6px; }
  .hero-subfields { display: flex; flex-direction: column; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 8px; margin-top: 6px; font-size: 0.9rem; gap: 4px; }
  
  h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; color: var(--text-main); display: flex; align-items: center; gap: 6px; }

  .tabs { display: flex; background: #e2e8f0; padding: 4px; border-radius: 12px; margin-bottom: 20px; }
  .tab-link { flex: 1; padding: 10px; border: none; border-radius: 10px; background: transparent; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: var(--transition); font-size: 0.9rem; }
  .tab-link.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .tab-content { display: none; animation: fadeIn 0.3s ease; }
  .tab-content.active { display: block; }

  input, select, textarea { width: 100%; padding: 14px; margin-bottom: 14px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; font-size: 0.95rem; color: var(--text-main); transition: var(--transition); outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px var(--primary-light); }
  .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: var(--transition); box-shadow: 0 4px 12px rgba(108, 71, 255, 0.15); }
  .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
  .btn-delete { background: var(--red); margin-top: 8px; }
  
  .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
  .list-item:last-child { border-bottom: none; }
  .item-left { display: flex; align-items: center; gap: 12px; }
  .item-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; background: var(--bg); }
  .wallet-card { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 10px; cursor: pointer; transition: var(--transition); }
  
  .toast { position: absolute; top: 20px; right: -320px; background: #1e293b; color: #fff; padding: 14px 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 2000; display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 0.9rem; transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .toast.show { right: 20px; }
  .toast.toast-success { border-left: 4px solid var(--green); }
  .toast.toast-warn { border-left: 4px solid var(--red); }

  .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
  .theme-box { border: 2px solid #e2e8f0; padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: 600; background: #fff; transition: var(--transition); }
  .theme-box.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

  .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; visibility: hidden; opacity: 0; transition: var(--transition); }
  .modal.active { visibility: visible; opacity: 1; }
  .modal-content { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 24px 24px 0 0; padding: 24px; transform: translateY(100%); transition: var(--transition); }
  .modal.active .modal-content { transform: translateY(0); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

  .income { color: var(--green); } .expense { color: var(--red); }
  .bg-green { background: #e6f4ea; color: var(--green); }
  .bg-red { background: #fce8e6; color: var(--red); }
  .spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
